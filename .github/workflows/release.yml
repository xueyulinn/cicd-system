name: Release

on:
  push:
    tags:
      - "*.*.*"   

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.6"
  COVERAGE_THRESHOLD: "70.0"
  IMAGE_NAME: e-team/cicd

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic tag (X.Y.Z)
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Tag: $tag"
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag: '$tag'. Expected semantic tag like '1.2.3'."
            exit 1
          fi
          echo "✅ Tag format looks good."

  check_directories:
    runs-on: ubuntu-latest
    outputs:
      cli_exists: ${{ steps.check.outputs.cli_exists }}
      server_exists: ${{ steps.check.outputs.server_exists }}
    steps:
      - uses: actions/checkout@v6
      - name: Check if directories exist
        id: check
        run: |
          if [ -d "cli" ]; then
            echo "✅ cli/ directory found."
            echo "cli_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ cli/ directory does not exist."
            echo "cli_exists=false" >> $GITHUB_OUTPUT
          fi
          if [ -d "server" ]; then
            echo "✅ server/ directory found."
            echo "server_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ server/ directory does not exist."
            echo "server_exists=false" >> $GITHUB_OUTPUT
          fi

  # ---- CLI ----
  cli_build:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.cli_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build (cli)
        working-directory: cli
        run: go build -v ./...

  cli_test:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.cli_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test (cli)
        working-directory: cli
        run: go test -v ./...

  cli_lint:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.cli_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint (cli)
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: cli
          args: --output.json.path=golangci-lint-report.json
      - name: Upload lint report (cli)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cli-golangci-lint-report-${{ github.ref_name }}
          path: cli/golangci-lint-report.json

  # ---- SERVER ----
  server_build:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.server_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build (server)
        working-directory: server
        run: go build -v ./...

  server_test:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.server_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage (server)
        working-directory: server
        run: go test ./... -coverprofile=coverage.out

      - name: Enforce minimum coverage (server)
        working-directory: server
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: $total%"

          threshold=${{ env.COVERAGE_THRESHOLD }}
          awk -v total="$total" -v threshold="$threshold" 'BEGIN {
            if (total < threshold) {
              printf "❌ Coverage %.2f%% is below threshold %.2f%%\n", total, threshold
              exit 1
            } else {
              printf "✅ Coverage %.2f%% meets threshold %.2f%%\n", total, threshold
            }
          }'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-${{ github.ref_name }}
          path: server/coverage.out

  server_lint:
    runs-on: ubuntu-latest
    needs: [validate_tag, check_directories]
    if: needs.check_directories.outputs.server_exists == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint (server)
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: server
          args: --output.json.path=golangci-lint-report.json
      - name: Upload lint report (server)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: server-golangci-lint-report-${{ github.ref_name }}
          path: server/golangci-lint-report.json


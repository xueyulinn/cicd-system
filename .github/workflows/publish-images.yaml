# Build and push all application images to GitHub Container Registry (GHCR).
# Image path: ghcr.io/<lowercase owner>/<lowercase repo>/<component>:<tags>
# Tags: short SHA, sha-<full SHA>, branch name "main" on default branch, and git tag on release tags.
#
# Forks: ensure Actions can write packages; override Helm image repositories if your GH org/repo differs.
# Multi-arch: buildx pushes a manifest list for linux/amd64 and linux/arm64 (QEMU on GHA for arm64).

name: Publish container images

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            dockerfile: cmd/api-gateway/Dockerfile
          - image: validation-service
            dockerfile: cmd/validation-service/Dockerfile
          - image: execution-service
            dockerfile: cmd/execution-service/Dockerfile
          - image: worker-service
            dockerfile: cmd/worker-service/Dockerfile
          - image: reporting-service
            dockerfile: cmd/reporting-service/Dockerfile
          - image: db-migrate
            dockerfile: migrations/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - name: Image base (GHCR, lowercase owner and repo)
        run: |
          owner=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          repo=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2 | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=ghcr.io/${owner}/${repo}" >> "$GITHUB_ENV"

      - name: Set up QEMU (for linux/arm64 on ubuntu-amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=sha,prefix=sha-,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Release

on:
  push:
    tags:
      - "*.*.*"   

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.6"
  COVERAGE_THRESHOLD: "70.0"
  IMAGE_NAME: e-team/cicd

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semantic tag (X.Y.Z)
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Tag: $tag"
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid tag: '$tag'. Expected semantic tag like '1.2.3'."
            exit 1
          fi
          echo "✅ Tag format looks good."

  build:
    runs-on: ubuntu-latest
    needs: [validate_tag]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -v ./cicd

  test:
    runs-on: ubuntu-latest
    needs: [validate_tag]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test
        run: go test -v ./...
      - name: Run test scripts
        shell: bash
        run: |
          shopt -s nullglob
          scripts=(test-*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No test-*.sh scripts found, skipping."
            exit 0
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            bash "$script"
          done

  lint:
    runs-on: ubuntu-latest
    needs: [validate_tag]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --output.json.path=golangci-lint-report.json
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: golangci-lint-report-${{ github.ref_name }}
          path: golangci-lint-report.json


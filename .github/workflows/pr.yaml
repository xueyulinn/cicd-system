name: PR Build and Test

permissions:
  contents: read
  pull-requests: read


on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "**/*.sh"
      - ".github/workflows/**"

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.6"
  COVERAGE_THRESHOLD: "70.0"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            go:
              - "cmd/**"
              - "internal/**"
              - "go.mod"
              - "go.sum"
              - "**/*.sh"
            workflows:
              - ".github/workflows/**"

  build:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build (cli)
        run: |
          mkdir -p dist
          go build -v -o dist/e-team-cli ./cmd/cicd

  test:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test (cli)
        run: go test -v ./...
      - name: Run test scripts
        shell: bash
        run: |
          shopt -s nullglob
          scripts=(test-*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No test-*.sh scripts found, skipping."
            exit 0
          fi
          for script in "${scripts[@]}"; do
            echo "Running $script"
            bash "$script"
          done

  lint:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --output.json.path=golangci-lint-report.json
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: golangci-lint-report
          path: golangci-lint-report.json
          retention-days: 1

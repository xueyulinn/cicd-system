global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: cicd-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8000
          - validation-service:8001
          - execution-service:8002
          - worker-service:8003
          - reporting-service:8004

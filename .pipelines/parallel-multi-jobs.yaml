# Multi-job parallel test:
# - 16 independent jobs in the same stage.
# - With WORKER_CONCURRENCY>=16, these jobs can run concurrently.
#
# Run:
#   ./bin/cicd run --file .pipelines/parallel-multi-jobs.yaml

pipeline:
  name: parallel-multi-jobs

stages:
  - build

job-01:
  - stage: build
  - image: alpine:latest
  - script:
    - echo "job-01 start"
    - sleep 6
    - echo "job-01 done"


# Demo pipeline: runs against current codebase (workspace mounted at /workspace).
# Uses go build / go test so jobs succeed with standard golang image.

pipeline:
  name: "Default Pipeline"

stages:
  - build
  - test
  - deploy

compile:
  - stage: build
  - image: golang:1.25
  - script:
    - "go build -o bin/cicd ./cmd/cicd"

unit-tests:
  - stage: test
  - image: golang:1.25
  - script:
    - "go test -v ./internal/... ./cmd/..."
  - failures: true

integration-tests:
  - stage: test
  - needs: [unit-tests]
  - image: golang:1.25
  - script:
    - "go test -v ./internal/... ./cmd/..."
  - failures: true

deploy-staging:
  - stage: deploy
  - image: alpine:latest
  - script:
    - "echo deploy staging"
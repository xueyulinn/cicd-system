# Test Case: Valid complex DAG with multiple dependencies
# Expected: Should pass validation

pipeline:
  name: "Complex Valid DAG"

stages:
  - prepare
  - build
  - test
  - deploy

setup:
  - stage: prepare
  - image: alpine:latest
  - script:
    - setup env

build-frontend:
  - stage: build
  - needs: [setup]
  - image: node:18
  - script:
    - build frontend

build-backend:
  - stage: build
  - needs: [setup]
  - image: golang:1.21
  - script:
    - build backend

test-frontend:
  - stage: test
  - needs: [build-frontend]
  - image: node:18
  - script:
    - test frontend

test-backend:
  - stage: test
  - needs: [build-backend]
  - image: golang:1.21
  - script:
    - test backend

integration-test:
  - stage: test
  - needs: [build-frontend, build-backend]
  - image: node:18
  - script:
    - integration tests

deploy-prod:
  - stage: deploy
  - needs: [test-frontend, test-backend, integration-test]
  - image: alpine:latest
  - script:
    - deploy production
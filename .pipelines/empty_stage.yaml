# Test Case: Pipeline with empty stage (no jobs assigned)
# Expected Error: No empty stages allowed

pipeline:
  name: "Empty Stage Pipeline"

stages:
  - build
  - test
  - deploy

compile:
  - stage: build
  - image: golang:1.21
  - script:
    - make build

unit-tests:
  - stage: test
  - image: golang:1.21
  - script:
    - make test
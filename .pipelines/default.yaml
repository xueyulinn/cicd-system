# Test Case: Valid pipeline configuration
# Expected: Should pass validation

pipeline:
  name: "Valid Pipeline"

compile:
  - stage: build
  - image: golang:1.21
  - script:
    - "make build"

unit-tests:
  - stage: test
  - needs: [compile]
  - image: golang:1.21
  - script:
    - "make test"

integration-tests:
  - stage: test
  - needs: [compile]
  - image: golang:1.21
  - script:
    - "make integration"

deploy-staging:
  - stage: invalid
  - needs: [unit-tests, integration-tests]
  - image: alpine:latest
  - script:
    - "deploy staging"
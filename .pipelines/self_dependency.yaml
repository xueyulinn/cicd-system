# Test Case: Job needs itself (self-loop)
# Expected Error: Cycle detected - compile -> compile

pipeline:
  name: "Self Dependency Pipeline"

stages:
  - name: "build"

jobs:
  - name: "compile"
    stage: "build"
    needs: ["compile"]  # Needs itself!
    image: "golang:1.21"
    script:
      - "make build"
pipeline:
  name: "allow-failures-true"

stages:
  - build
  - test
  - deploy

compile:
  - stage: build
  - image: "golang:1.25"
  - script:
      - "go build ./..."

lint:
  - stage: build
  - image: "golang:1.21"
  - failures: true
  - script:
      - "golangci-lint run"

unit-tests:
  - stage: test
  - image: "golang:1.25"
  - script:
      - "go test ./..."

deploy-prod:
  - stage: deploy
  - image: "alpine:3.20"
  - script:
      - "echo deploy"

# PostgreSQL for report store (development).
# Start: docker compose up -d
# Stop:  docker compose down
# Connection: see dev-docs/report-db-setup.md and use DATABASE_URL or REPORT_DB_URL

services:
  postgres:
    image: postgres:16-alpine
    container_name: e-team-postgres
    environment:
      POSTGRES_USER: cicd
      POSTGRES_PASSWORD: cicd
      POSTGRES_DB: reportstore
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cicd -d reportstore"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    container_name: e-team-api-gateway
    build:
      context: .
      dockerfile: cmd/api-gateway/Dockerfile
    environment:
      PORT: "8000"
      VALIDATION_URL: http://validation-service:8001
      EXECUTION_URL: http://execution-service:8002
      REPORTING_URL: http://reporting-service:8004
    depends_on:
      - validation-service
      - execution-service
      - reporting-service
    ports:
      - "8000:8000"

  execution-service:
    container_name: e-team-execution-service
    build:
      context: .
      dockerfile: cmd/execution-service/Dockerfile
    environment:
      PORT: "8002"
      DATABASE_URL: postgres://cicd:cicd@postgres:5432/reportstore?sslmode=disable
      VALIDATION_URL: http://validation-service:8001
      WORKER_URL: http://worker-service:8003
    depends_on:
      postgres:
        condition: service_healthy
      validation-service:
        condition: service_started
      worker-service:
        condition: service_started
    ports:
      - "8002:8002"

  validation-service:
    container_name: e-team-validation-service
    build:
      context: .
      dockerfile: cmd/validation-service/Dockerfile
    environment:
      PORT: "8001"
    ports:
      - "8001:8001"

  worker-service:
    container_name: e-team-worker-service
    build:
      context: .
      dockerfile: cmd/worker-service/Dockerfile
    environment:
      PORT: "8003"
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  reporting-service:
    container_name: e-team-reporting-service
    build:
      context: .
      dockerfile: cmd/reporting-service/Dockerfile
    environment:
      PORT: "8004"
      DATABASE_URL: postgres://cicd:cicd@postgres:5432/reportstore?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8004:8004"

# MySQL 8 for report store (development).
#
# compose.values.env is generated from charts/e-team/values.yaml (single source of truth with Helm):
#   image tags, MySQL credentials, RabbitMQ image/credentials/RABBITMQ_URL, WORKER_CONCURRENCY,
#   EXECUTION_URL (worker → execution in Compose DNS).
# Regenerate: ruby scripts/gen-compose-env-from-values.rb
# Start: docker compose --env-file compose.values.env up -d
# Stop:  docker compose --env-file compose.values.env down
# Connection: see dev-docs/report-db-setup.md and use DATABASE_URL or REPORT_DB_URL (MySQL DSN)

services:
  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: e-team-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: ${MYSQL_IMAGE}
    container_name: e-team-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    image: ${MIGRATION_IMAGE}
    container_name: e-team-db-migrate
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_NAME: ${MYSQL_DATABASE}
    restart: "no"

  api-gateway:
    container_name: e-team-api-gateway
    image: ${API_GATEWAY_IMAGE}
    environment:
      PORT: "8000"
      VALIDATION_URL: http://validation-service:8001
      EXECUTION_URL: http://execution-service:8002
      REPORTING_URL: http://reporting-service:8004
      SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      - validation-service
      - execution-service
      - reporting-service
    ports:
      - "8000:8000"

  execution-service:
    container_name: e-team-execution-service
    image: ${EXECUTION_SERVICE_IMAGE}
    environment:
      PORT: "8002"
      DATABASE_URL: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=UTC
      RABBITMQ_URL: ${RABBITMQ_URL}
      VALIDATION_URL: http://validation-service:8001
      WORKER_URL: http://worker-service:8003
      SERVICE_NAME: execution-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      validation-service:
        condition: service_started
      worker-service:
        condition: service_started
    ports:
      - "8002:8002"

  validation-service:
    container_name: e-team-validation-service
    image: ${VALIDATION_SERVICE_IMAGE}
    environment:
      PORT: "8001"
      SERVICE_NAME: validation-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    ports:
      - "8001:8001"

  worker-service:
    container_name: e-team-worker-service
    image: ${WORKER_SERVICE_IMAGE}
    # Local-dev friendly: run as root so docker.sock works out of the box.
    user: "0:0"
    environment:
      PORT: "8003"
      RABBITMQ_URL: ${RABBITMQ_URL}
      EXECUTION_URL: ${EXECUTION_URL}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SERVICE_NAME: worker-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy

  reporting-service:
    container_name: e-team-reporting-service
    image: ${REPORTING_SERVICE_IMAGE}
    environment:
      PORT: "8004"
      DATABASE_URL: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=UTC
      SERVICE_NAME: reporting-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "8004:8004"

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: e-team-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  loki:
    image: ${LOKI_IMAGE}
    container_name: e-team-loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: ${TEMPO_IMAGE}
    container_name: e-team-tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    container_name: e-team-otel-collector
    command:
      - --config=/etc/otelcol-contrib/config.yml
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - loki
      - tempo
    ports:
      - "4319:4318"
      - "13133:13133"
      - "8890:8889"

  promtail:
    image: ${PROMTAIL_IMAGE}
    container_name: e-team-promtail
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: e-team-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    # Order matters: bind-mount dashboards AFTER the named volume so the host JSON
    # overlays /var/lib/grafana/dashboards (otherwise the volume can hide provisioned files).
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

services:
  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_AMQP_PORT}:${RABBITMQ_AMQP_PORT}"
      - "${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_PORT}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: ${MYSQL_IMAGE}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    image: ${MIGRATION_IMAGE}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_HOST: mysql
      DB_PORT: "${MYSQL_PORT}"
      DB_USER: ${MYSQL_USER}
      DB_NAME: ${MYSQL_DATABASE}
    restart: "no"

  api-gateway:
    image: ${API_GATEWAY_IMAGE}
    environment:
      PORT: "${API_GATEWAY_PORT}"
      VALIDATION_URL: ${VALIDATION_URL}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL}
      REPORTING_URL: ${REPORTING_URL}
      SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      - validation-service
      - orchestrator-service
      # - reporting-service
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"

  orchestrator-service:
    image: ${ORCHESTRATOR_SERVICE_IMAGE}
    environment:
      PORT: "${ORCHESTRATOR_SERVICE_PORT}"
      DATABASE_URL: ${REPORT_DB_DSN}
      RABBITMQ_URL: ${RABBITMQ_URL}
      VALIDATION_URL: ${VALIDATION_URL}
      WORKER_URL: ${WORKER_URL}
      SERVICE_NAME: orchestrator-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      validation-service:
        condition: service_started
      worker-service:
        condition: service_started
    ports:
      - "${ORCHESTRATOR_SERVICE_PORT}:${ORCHESTRATOR_SERVICE_PORT}"

  validation-service:
    image: ${VALIDATION_SERVICE_IMAGE}
    environment:
      PORT: "${VALIDATION_SERVICE_PORT}"
      SERVICE_NAME: validation-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
    ports:
      - "${VALIDATION_SERVICE_PORT}:${VALIDATION_SERVICE_PORT}"

  worker-service:
    image: ${WORKER_SERVICE_IMAGE}
    # Local-dev friendly: run as root so docker.sock works out of the box.
    user: "0:0"
    environment:
      PORT: "${WORKER_SERVICE_PORT}"
      RABBITMQ_URL: ${RABBITMQ_URL}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SERVICE_NAME: worker-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
    ports:
      - "${WORKER_SERVICE_PORT}:${WORKER_SERVICE_PORT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy

  reporting-service:
    image: ${REPORTING_SERVICE_IMAGE}
    environment:
      PORT: "${REPORTING_SERVICE_PORT}"
      DATABASE_URL: ${REPORT_DB_DSN}
      SERVICE_NAME: reporting-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${REPORTING_SERVICE_PORT}:${REPORTING_SERVICE_PORT}"

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"

  loki:
    image: ${LOKI_IMAGE}
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT}:${LOKI_PORT}"

  tempo:
    image: ${TEMPO_IMAGE}
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT}:${TEMPO_PORT}"
      - "${TEMPO_OTLP_GRPC_PORT}:${TEMPO_OTLP_GRPC_PORT}"
      - "${TEMPO_OTLP_HTTP_PORT}:${TEMPO_OTLP_HTTP_PORT}"

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    command:
      - --config=/etc/otelcol-contrib/config.yml
    volumes:
      - ./observability/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - loki
      - tempo
    ports:
      - "${OTEL_COLLECTOR_OTLP_HOST_PORT}:${OTEL_COLLECTOR_OTLP_HTTP_PORT}"
      - "${OTEL_COLLECTOR_HEALTH_PORT}:${OTEL_COLLECTOR_HEALTH_PORT}"
      - "${OTEL_COLLECTOR_METRICS_HOST_PORT}:${OTEL_COLLECTOR_METRICS_PORT}"

  promtail:
    image: ${PROMTAIL_IMAGE}
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: ${GRAFANA_IMAGE}
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    # Order matters: bind-mount dashboards AFTER the named volume so the host JSON
    # overlays /var/lib/grafana/dashboards (otherwise the volume can hide provisioned files).
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:

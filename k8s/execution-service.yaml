apiVersion: v1
kind: ConfigMap
metadata:
  name: execution-service-config
  labels:
    app: execution-service
data:
  PORT: "8002"
  DATABASE_URL: postgres://cicd:cicd@postgres:5432/reportstore?sslmode=disable
  VALIDATION_URL: http://validation-service:8001
  WORKER_URL: http://worker-service:8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  labels:
    app: execution-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution-service
  template:
    metadata:
      labels:
        app: execution-service
    spec:
      containers:
        - name: execution-service
          image: yulinxue/cicd-execution-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: execution-service-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  labels:
    app: execution-service
spec:
  selector:
    app: execution-service
  ports:
    - name: http
      port: 8002
      targetPort: http
  type: ClusterIP

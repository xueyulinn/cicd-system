# Source: e-team/templates/execution-service.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e-team-execution-service
  labels:
    helm.sh/chart: e-team-0.1.0
    app.kubernetes.io/name: e-team
    app.kubernetes.io/instance: e-team
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: execution-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: e-team
      app.kubernetes.io/instance: e-team
      app.kubernetes.io/component: execution-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-team
        app.kubernetes.io/instance: e-team
        app.kubernetes.io/component: execution-service
    spec:
      initContainers:
        - name: wait-for-report-db
          image: "postgres:16-alpine"
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "e-team-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "cicd"
            - name: PGDATABASE
              value: "reportstore"
            - name: PGPASSWORD
              value: "cicd"
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for Postgres..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                sleep 2
              done
              echo "Waiting for migrations (pipeline_runs)..."
              until [ "$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -t -A -c \
                "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'pipeline_runs')::text" | tr -d '[:space:]')" = "true" ]; do
                sleep 2
              done
      containers:
        - name: execution-service
          image: "yulinxue/cicd-execution-service:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: e-team-execution-service-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi

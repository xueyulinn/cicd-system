# Source: e-team/templates/migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: e-team-report-db-migrate
  labels:
    helm.sh/chart: e-team-0.1.0
    app.kubernetes.io/name: e-team
    app.kubernetes.io/instance: e-team
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: "before-hook-creation,hook-succeeded"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-team
        app.kubernetes.io/instance: e-team
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: "postgres:16-alpine"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h e-team-postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."
                sleep 3
              done
              echo "postgres is accepting connections"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: e-team-postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: e-team-postgres-credentials
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: e-team-postgres-credentials
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: "yulinxue/cicd-db-migrate:latest"
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: e-team-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:

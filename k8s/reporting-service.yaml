apiVersion: v1
kind: ConfigMap
metadata:
  name: reporting-service-config
  labels:
    app: reporting-service
data:
  PORT: "8004"
  DATABASE_URL: postgres://cicd:cicd@postgres:5432/reportstore?sslmode=disable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  labels:
    app: reporting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
        - name: reporting-service
          image: yulinxue/cicd-reporting-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8004
          envFrom:
            - configMapRef:
                name: reporting-service-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  labels:
    app: reporting-service
spec:
  selector:
    app: reporting-service
  ports:
    - name: http
      port: 8004
      targetPort: http
  type: ClusterIP

apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-service-config
  labels:
    app: worker-service
data:
  PORT: "8003"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: yulinxue/cicd-worker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8003
          envFrom:
            - configMapRef:
                name: worker-service-config
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  labels:
    app: worker-service
spec:
  selector:
    app: worker-service
  ports:
    - name: http
      port: 8003
      targetPort: http
  type: ClusterIP

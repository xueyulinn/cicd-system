# Default dev credentials (match docker-compose). Override in production via sealed-secrets / external secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: e-team
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: e-team
type: Opaque
stringData:
  POSTGRES_USER: cicd
  POSTGRES_PASSWORD: cicd
  POSTGRES_DB: reportstore

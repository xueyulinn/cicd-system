# Applies all SQL files baked into the migrate image (sorted: 001, 002, …).
# Build: docker build -f migrations/Dockerfile -t e-team-db-migrate:latest .
# Minikube: minikube image build -t e-team-db-migrate:latest -f migrations/Dockerfile .
#
# Re-run after changing migrations: kubectl -n e-team delete job report-db-migrate --ignore-not-found
#   then kubectl apply -k k8s/postgres/
apiVersion: batch/v1
kind: Job
metadata:
  name: report-db-migrate
  namespace: e-team
  labels:
    app.kubernetes.io/name: report-db-migrate
    app.kubernetes.io/part-of: e-team
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: report-db-migrate
        app.kubernetes.io/part-of: e-team
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."
                sleep 3
              done
              echo "postgres is accepting connections"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: e-team-db-migrate:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD

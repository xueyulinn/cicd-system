# Required by StatefulSet for stable pod DNS (postgres-0.postgres-headless.e-team.svc...).
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: e-team
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: e-team
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: postgres

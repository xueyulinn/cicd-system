{{- if .Values.executionService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.executionServiceName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: execution-service
data:
  PORT: {{ .Values.executionService.service.port | quote }}
  DATABASE_URL: {{ include "e-team.databaseURL" . | quote }}
  VALIDATION_URL: http://{{ include "e-team.validationServiceName" . }}:{{ .Values.validationService.service.port }}
  WORKER_URL: http://{{ include "e-team.workerServiceName" . }}:{{ .Values.workerService.service.port }}
  SERVICE_NAME: execution-service
  OTEL_SERVICE_NAME: execution-service
  {{- if .Values.observability.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "e-team.otelHTTPEndpoint" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "e-team.executionServiceName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: execution-service
spec:
  replicas: {{ .Values.executionService.replicaCount }}
  selector:
    matchLabels:
      {{- include "e-team.componentLabels" (dict "context" . "component" "execution-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "e-team.componentLabels" (dict "context" . "component" "execution-service") | nindent 8 }}
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.executionService.waitForDatabase.enabled (and .Values.rabbitmq.enabled .Values.executionService.waitForRabbitmq.enabled) }}
      initContainers:
        {{- if .Values.executionService.waitForDatabase.enabled }}
        - name: wait-for-report-db
          image: "{{ .Values.executionService.waitForDatabase.image.repository }}:{{ .Values.executionService.waitForDatabase.image.tag }}"
          imagePullPolicy: {{ .Values.executionService.waitForDatabase.image.pullPolicy }}
          env:
            - name: DB_HOST
              value: {{ include "e-team.databaseHost" . | quote }}
            - name: DB_PORT
              value: {{ include "e-team.databasePort" . | quote }}
            - name: DB_USER
              value: {{ include "e-team.databaseUser" . | quote }}
            - name: DB_NAME
              value: {{ include "e-team.databaseName" . | quote }}
            - name: DB_PASSWORD
              value: {{ include "e-team.databasePassword" . | quote }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for MySQL..."
              until mysqladmin --protocol=TCP -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" ping --silent; do
                sleep 2
              done
              echo "Waiting for migrations (pipeline_runs)..."
              until [ "$(mysql --protocol=TCP -h "$DB_HOST" -P "$DB_PORT" -u"$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" -N -B -e \
                "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name = 'pipeline_runs'" | tr -d '[:space:]')" = "1" ]; do
                sleep 2
              done
        {{- end }}
        {{- if and .Values.rabbitmq.enabled .Values.executionService.waitForRabbitmq.enabled }}
        - name: wait-for-rabbitmq
          image: "{{ .Values.executionService.waitForRabbitmq.image.repository }}:{{ .Values.executionService.waitForRabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.executionService.waitForRabbitmq.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for RabbitMQ..."
              until nc -z {{ include "e-team.rabbitmqName" . }} {{ .Values.rabbitmq.service.amqpPort }}; do
                sleep 2
              done
        {{- end }}
      {{- end }}
      containers:
        - name: execution-service
          image: "{{ .Values.executionService.image.repository }}:{{ .Values.executionService.image.tag }}"
          imagePullPolicy: {{ .Values.executionService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.executionService.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "e-team.executionServiceName" . }}-config
            {{- if .Values.rabbitmq.enabled }}
            - secretRef:
                name: {{ include "e-team.rabbitmqSecretName" . }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.executionService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-team.executionServiceName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: execution-service
spec:
  selector:
    {{- include "e-team.componentLabels" (dict "context" . "component" "execution-service") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.executionService.service.port }}
      targetPort: http
  type: ClusterIP
{{- end }}

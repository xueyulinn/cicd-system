{{- if .Values.apiGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.apiGatewayName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
data:
  PORT: {{ .Values.apiGateway.service.port | quote }}
  VALIDATION_URL: http://{{ include "e-team.validationServiceName" . }}:{{ .Values.validationService.service.port }}
  EXECUTION_URL: http://{{ include "e-team.executionServiceName" . }}:{{ .Values.executionService.service.port }}
  REPORTING_URL: http://{{ include "e-team.reportingServiceName" . }}:{{ .Values.reportingService.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "e-team.apiGatewayName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "e-team.componentLabels" (dict "context" . "component" "api-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "e-team.componentLabels" (dict "context" . "component" "api-gateway") | nindent 8 }}
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.apiGateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "e-team.apiGatewayName" . }}-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-team.apiGatewayName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  selector:
    {{- include "e-team.componentLabels" (dict "context" . "component" "api-gateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.apiGateway.service.port }}
      targetPort: http
  type: {{ .Values.apiGateway.service.type }}
{{- if .Values.apiGateway.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "e-team.apiGatewayName" . }}-ingress
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
  {{- with .Values.apiGateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.apiGateway.ingress.className }}
  rules:
    - host: {{ .Values.apiGateway.ingress.host }}
      http:
        paths:
          - path: {{ .Values.apiGateway.ingress.path }}
            pathType: {{ .Values.apiGateway.ingress.pathType }}
            backend:
              service:
                name: {{ include "e-team.apiGatewayName" . }}
                port:
                  number: {{ .Values.apiGateway.service.port }}
{{- end }}
{{- end }}

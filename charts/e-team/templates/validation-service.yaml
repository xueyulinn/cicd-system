{{- if .Values.validationService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.validationServiceName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation-service
data:
  PORT: {{ .Values.validationService.service.port | quote }}
  SERVICE_NAME: validation-service
  OTEL_SERVICE_NAME: validation-service
  {{- if .Values.observability.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ include "e-team.otelHTTPEndpoint" . | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "e-team.validationServiceName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation-service
spec:
  replicas: {{ .Values.validationService.replicaCount }}
  selector:
    matchLabels:
      {{- include "e-team.componentLabels" (dict "context" . "component" "validation-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "e-team.componentLabels" (dict "context" . "component" "validation-service") | nindent 8 }}
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: validation-service
          image: "{{ .Values.validationService.image.repository }}:{{ .Values.validationService.image.tag }}"
          imagePullPolicy: {{ .Values.validationService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.validationService.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "e-team.validationServiceName" . }}-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.validationService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-team.validationServiceName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: validation-service
spec:
  selector:
    {{- include "e-team.componentLabels" (dict "context" . "component" "validation-service") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.validationService.service.port }}
      targetPort: http
  type: ClusterIP
{{- end }}

server:
  http_listen_port: 9080

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://{{ include "e-team.lokiName" . }}:{{ .Values.observability.loki.service.port }}/loki/api/v1/push

scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - {{ .Release.Namespace }}
    pipeline_stages:
      - cri: {}
      - json:
          expressions:
            level: level
            trace_id: trace_id
            pipeline: pipeline
            run_no: run_no
            stage: stage
            job: job
            service: service
            source: source
            event: event
            git_branch: git_branch
            git_hash: git_hash
            status: status
            duration_s: duration_s
      - labels:
          level:
          trace_id:
          pipeline:
          run_no:
          stage:
          job:
          service:
          source:
          event:
          status:
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: node
      - source_labels:
          - __meta_kubernetes_pod_label_app_kubernetes_io_component
        target_label: component
      - source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
      - action: replace
        replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__

nameOverride: ""
fullnameOverride: ""

# Application images are built and pushed by .github/workflows/publish-images.yaml to GHCR:
#   ghcr.io/<lowercase github org>/<lowercase repo>/<component>
# Default tag `main` tracks the latest image built from the main branch; pin with a short SHA or release tag.
# If you fork, replace the ghcr.io/... prefix to match your repository (or override per-service below).
global:
  imagePullSecrets: []
  podAnnotations: {}

apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/api-gateway
    tag: main
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ingress:
    enabled: true
    className: nginx
    host: cicd.local
    path: /
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"

validationService:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/validation-service
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 8001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

executionService:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/execution-service
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 8002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  waitForDatabase:
    enabled: true
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
  waitForRabbitmq:
    enabled: true
    image:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent

workerService:
  enabled: true
  replicaCount: 1
  # RabbitMQ consumers per worker Pod (parallel-ready jobs within a stage).
  concurrency: 2
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/worker-service
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 8003
  dockerSocket:
    enabled: true
    hostPath: /var/run/docker.sock
  gitAuth:
    existingSecret: ""
    username: ""
    password: ""
    githubToken: ""
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  waitForRabbitmq:
    enabled: true
    image:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

reportingService:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/reporting-service
    tag: main
    pullPolicy: IfNotPresent
  service:
    port: 8004
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  waitForDatabase:
    enabled: true
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent

postgres:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  auth:
    username: cicd
    password: cicd
    database: reportstore
  service:
    port: 5432
  persistence:
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

externalDatabase:
  url: ""
  host: ""
  port: 5432
  username: ""
  password: ""
  database: ""

# In-cluster RabbitMQ (same role as docker-compose rabbitmq service).
rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: 3-management-alpine
    pullPolicy: IfNotPresent
  auth:
    username: guest
    password: guest
  service:
    amqpPort: 5672
    managementPort: 15672
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 18
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 6
  persistence:
    enabled: false
    size: 2Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

migration:
  enabled: true
  image:
    repository: ghcr.io/cs7580-sea-sp26/e-team/db-migrate
    tag: main
    pullPolicy: IfNotPresent
  backoffLimit: 5
  ttlSecondsAfterFinished: 86400
  hookDeletePolicy: before-hook-creation,hook-succeeded

observability:
  enabled: false

  prometheus:
    image:
      repository: prom/prometheus
      tag: v3.7.2
      pullPolicy: IfNotPresent
    service:
      port: 9090
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  loki:
    image:
      repository: grafana/loki
      tag: 3.5.7
      pullPolicy: IfNotPresent
    service:
      port: 3100
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  tempo:
    image:
      repository: grafana/tempo
      tag: 2.8.2
      pullPolicy: IfNotPresent
    service:
      port: 3200
      otlpGrpcPort: 4317
      otlpHttpPort: 4318
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

  otelCollector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.128.0
      pullPolicy: IfNotPresent
    service:
      otlpGrpcPort: 4317
      otlpHttpPort: 4318
      healthPort: 13133
      metricsPort: 8889
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  promtail:
    enabled: true
    image:
      repository: grafana/promtail
      tag: 3.5.7
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  grafana:
    image:
      repository: grafana/grafana
      tag: 12.0.2
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
    ingress:
      enabled: false
      className: nginx
      host: grafana.cicd.local
      path: /
      pathType: Prefix
      annotations: {}
    persistence:
      enabled: true
      size: 5Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi


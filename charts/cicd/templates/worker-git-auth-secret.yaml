{{- if and .Values.workerService.enabled (not .Values.workerService.gitAuth.existingSecret) (or .Values.workerService.gitAuth.username .Values.workerService.gitAuth.password .Values.workerService.gitAuth.githubToken) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "e-team.workerGitAuthSecretName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-service
type: Opaque
stringData:
  {{- if .Values.workerService.gitAuth.username }}
  GIT_USERNAME: {{ .Values.workerService.gitAuth.username | quote }}
  {{- end }}
  {{- if .Values.workerService.gitAuth.password }}
  GIT_PASSWORD: {{ .Values.workerService.gitAuth.password | quote }}
  {{- end }}
  {{- if .Values.workerService.gitAuth.githubToken }}
  GITHUB_TOKEN: {{ .Values.workerService.gitAuth.githubToken | quote }}
  {{- end }}
{{- end }}

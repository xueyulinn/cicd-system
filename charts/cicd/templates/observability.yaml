{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.prometheusName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
{{ tpl (.Files.Get "files/observability/prometheus.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.lokiName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
data:
  loki.yml: |
{{ tpl (.Files.Get "files/observability/loki.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.tempoName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yml: |
{{ tpl (.Files.Get "files/observability/tempo.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.otelCollectorName" . }}-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yml: |
{{ tpl (.Files.Get "files/observability/otel-collector.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.grafanaName" . }}-datasources
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yml: |
{{ tpl (.Files.Get "files/observability/grafana-datasources.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.grafanaName" . }}-dashboards-config
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboards.yml: |
{{ tpl (.Files.Get "files/observability/grafana-dashboards.yml") . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "e-team.grafanaName" . }}-dashboards
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  {{- range $path, $_ := .Files.Glob "files/observability/dashboards/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "e-team.grafanaName" . }}-credentials
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  admin-user: {{ .Values.observability.grafana.adminUser | quote }}
  admin-password: {{ .Values.observability.grafana.adminPassword | quote }}
{{- if .Values.observability.prometheus.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "e-team.observabilityPrometheusPVCName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  accessModes:
    {{- toYaml .Values.observability.prometheus.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.observability.prometheus.persistence.size }}
  {{- if .Values.observability.prometheus.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.prometheus.persistence.storageClassName }}
  {{- end }}
{{- end }}
{{- if .Values.observability.loki.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "e-team.observabilityLokiPVCName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  accessModes:
    {{- toYaml .Values.observability.loki.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.observability.loki.persistence.size }}
  {{- if .Values.observability.loki.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.loki.persistence.storageClassName }}
  {{- end }}
{{- end }}
{{- if .Values.observability.tempo.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "e-team.observabilityTempoPVCName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  accessModes:
    {{- toYaml .Values.observability.tempo.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.observability.tempo.persistence.size }}
  {{- if .Values.observability.tempo.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.tempo.persistence.storageClassName }}
  {{- end }}
{{- end }}
{{- if .Values.observability.grafana.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "e-team.observabilityGrafanaPVCName" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    {{- toYaml .Values.observability.grafana.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.observability.grafana.persistence.size }}
  {{- if .Values.observability.grafana.persistence.storageClassName }}
  storageClassName: {{ .Values.observability.grafana.persistence.storageClassName }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "e-team.prometheusName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "e-team.componentLabels" (dict "context" . "component" "prometheus") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "e-team.componentLabels" (dict "context" . "component" "prometheus") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prometheus
          image: "{{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: {{ .Values.observability.prometheus.service.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "e-team.prometheusName" . }}-config
        - name: data
          {{- if .Values.observability.prometheus.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "e-team.observabilityPrometheusPVCName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-team.prometheusName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  selector:
    {{- include "e-team.componentLabels" (dict "context" . "component" "prometheus") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.service.port }}
      targetPort: http
  type: ClusterIP
---

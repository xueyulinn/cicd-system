---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "e-team.grafanaName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "e-team.componentLabels" (dict "context" . "component" "grafana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "e-team.componentLabels" (dict "context" . "component" "grafana") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: grafana
          image: "{{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.observability.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "e-team.grafanaName" . }}-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "e-team.grafanaName" . }}-credentials
                  key: admin-password
          ports:
            - name: http
              containerPort: {{ .Values.observability.grafana.service.port }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.observability.grafana.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "e-team.observabilityGrafanaPVCName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: datasources
          configMap:
            name: {{ include "e-team.grafanaName" . }}-datasources
        - name: dashboards-config
          configMap:
            name: {{ include "e-team.grafanaName" . }}-dashboards-config
        - name: dashboards
          configMap:
            name: {{ include "e-team.grafanaName" . }}-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-team.grafanaName" . }}
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  selector:
    {{- include "e-team.componentLabels" (dict "context" . "component" "grafana") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.grafana.service.port }}
      targetPort: http
  type: {{ .Values.observability.grafana.service.type }}
{{- if .Values.observability.grafana.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "e-team.grafanaName" . }}-ingress
  labels:
    {{- include "e-team.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  {{- with .Values.observability.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.observability.grafana.ingress.className }}
  rules:
    - host: {{ .Values.observability.grafana.ingress.host }}
      http:
        paths:
          - path: {{ .Values.observability.grafana.ingress.path }}
            pathType: {{ .Values.observability.grafana.ingress.pathType }}
            backend:
              service:
                name: {{ include "e-team.grafanaName" . }}
                port:
                  number: {{ .Values.observability.grafana.service.port }}
{{- end }}
{{- end }}

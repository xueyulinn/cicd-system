# Local development overrides — automatically loaded by `docker compose up`.
# Builds service images from source instead of pulling from the registry.
# Use chart-aligned env: docker compose --env-file compose.values.env up -d
# Registry-only: docker compose --env-file compose.values.env -f docker-compose.yaml up -d

services:
  api-gateway:
    build:
      context: .
      dockerfile: cmd/api-gateway/Dockerfile

  execution-service:
    build:
      context: .
      dockerfile: cmd/execution-service/Dockerfile

  validation-service:
    build:
      context: .
      dockerfile: cmd/validation-service/Dockerfile

  worker-service:
    build:
      context: .
      dockerfile: cmd/worker-service/Dockerfile

  reporting-service:
    build:
      context: .
      dockerfile: cmd/reporting-service/Dockerfile
